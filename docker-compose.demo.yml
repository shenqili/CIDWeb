services:
  frontend:
    image: node:20-alpine
    container_name: cidweb-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - .env.demo
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      api:
        condition: service_started
    networks:
      - cidweb-net

  api:
    image: python:3.11-slim
    container_name: cidweb-api
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env.demo
    environment:
      APP_ENV: ${APP_ENV:-demo}
      DATABASE_URL: ${DATABASE_URL:-postgresql://cidweb:cidweb@postgres:5432/cidweb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FILE_STORAGE_ROOT: ${FILE_STORAGE_ROOT:-/storage}
      RAW_STORAGE_ROOT: ${RAW_STORAGE_ROOT:-/storage/raw}
      INTERMEDIATE_STORAGE_ROOT: ${INTERMEDIATE_STORAGE_ROOT:-/storage/intermediate}
      EXPORT_STORAGE_ROOT: ${EXPORT_STORAGE_ROOT:-/storage/exports}
      CHART_STORAGE_ROOT: ${CHART_STORAGE_ROOT:-/storage/charts}
      MANIFEST_STORAGE_ROOT: ${MANIFEST_STORAGE_ROOT:-/storage/manifests}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-demo}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./backend:/app/backend
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cidweb-net

  worker:
    image: python:3.11-slim
    container_name: cidweb-worker
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && celery -A app.worker.celery_app worker --loglevel=INFO"
    env_file:
      - .env.demo
    environment:
      APP_ENV: ${APP_ENV:-demo}
      DATABASE_URL: ${DATABASE_URL:-postgresql://cidweb:cidweb@postgres:5432/cidweb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FILE_STORAGE_ROOT: ${FILE_STORAGE_ROOT:-/storage}
      RAW_STORAGE_ROOT: ${RAW_STORAGE_ROOT:-/storage/raw}
      INTERMEDIATE_STORAGE_ROOT: ${INTERMEDIATE_STORAGE_ROOT:-/storage/intermediate}
      EXPORT_STORAGE_ROOT: ${EXPORT_STORAGE_ROOT:-/storage/exports}
      CHART_STORAGE_ROOT: ${CHART_STORAGE_ROOT:-/storage/charts}
      MANIFEST_STORAGE_ROOT: ${MANIFEST_STORAGE_ROOT:-/storage/manifests}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-demo}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./backend:/app/backend
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cidweb-net

  scheduler:
    image: python:3.11-slim
    container_name: cidweb-scheduler
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && celery -A app.worker.celery_app beat --loglevel=INFO"
    env_file:
      - .env.demo
    environment:
      APP_ENV: ${APP_ENV:-demo}
      DATABASE_URL: ${DATABASE_URL:-postgresql://cidweb:cidweb@postgres:5432/cidweb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FILE_STORAGE_ROOT: ${FILE_STORAGE_ROOT:-/storage}
      RAW_STORAGE_ROOT: ${RAW_STORAGE_ROOT:-/storage/raw}
      INTERMEDIATE_STORAGE_ROOT: ${INTERMEDIATE_STORAGE_ROOT:-/storage/intermediate}
      EXPORT_STORAGE_ROOT: ${EXPORT_STORAGE_ROOT:-/storage/exports}
      CHART_STORAGE_ROOT: ${CHART_STORAGE_ROOT:-/storage/charts}
      MANIFEST_STORAGE_ROOT: ${MANIFEST_STORAGE_ROOT:-/storage/manifests}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-demo}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./backend:/app/backend
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cidweb-net

  postgres:
    image: postgres:16-alpine
    container_name: cidweb-postgres
    env_file:
      - .env.demo
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cidweb}
      POSTGRES_USER: ${POSTGRES_USER:-cidweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cidweb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cidweb -d cidweb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cidweb-net

  redis:
    image: redis:7-alpine
    container_name: cidweb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cidweb-net

  virus-scan:
    image: clamav/clamav:stable
    container_name: cidweb-virus-scan
    ports:
      - "3310:3310"
    networks:
      - cidweb-net

networks:
  cidweb-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
